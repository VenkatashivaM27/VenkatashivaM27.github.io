    function MailIcon() { return <svg viewBox="0 0 24 24" fill="none" className="h-5 w-5"><path d="M4 6h16v12H4V6Z" stroke="currentColor" strokeWidth="1.8"/><path d="m4 7 8 6 8-6" stroke="currentColor" strokeWidth="1.8"/></svg>; }
    function LinkedInIcon() { return <svg viewBox="0 0 24 24" fill="currentColor" className="h-5 w-5"><path d="M6.94 8.9H3.75v10.36h3.19V8.9ZM5.35 4.74a1.85 1.85 0 1 0 0 3.7 1.85 1.85 0 0 0 0-3.7Zm14.9 8.55c0-2.78-1.49-4.07-3.48-4.07a3 3 0 0 0-2.72 1.5V8.9h-3.06v10.36h3.18v-5.13c0-1.35.26-2.65 1.92-2.65 1.64 0 1.66 1.53 1.66 2.74v5.04h3.19v-5.97h-.69Z"/></svg>; }
    function GitHubIcon() { return <svg viewBox="0 0 24 24" fill="currentColor" className="h-5 w-5"><path d="M12 .9a11.1 11.1 0 0 0-3.51 21.63c.56.1.76-.24.76-.54v-1.9c-3.1.68-3.76-1.33-3.76-1.33-.5-1.29-1.24-1.63-1.24-1.63-1.02-.7.08-.68.08-.68 1.12.08 1.71 1.15 1.71 1.15 1 .1.2 2.63 1.23 3.19 1.87.53 2.54-.39 2.54-.39.1-.72.39-1.21.71-1.49-2.48-.28-5.09-1.24-5.09-5.52 0-1.22.44-2.22 1.15-3-.12-.28-.5-1.42.11-2.96 0 0 .94-.3 3.06 1.15a10.6 10.6 0 0 1 5.58 0c2.12-1.45 3.05-1.15 3.05-1.15.62 1.54.23 2.68.12 2.96.72.78 1.15 1.78 1.15 3 0 4.29-2.62 5.23-5.11 5.51.4.35.76 1.03.76 2.08v3.08c0 .3.2.65.77.54A11.1 11.1 0 0 0 12 .9Z"/></svg>; }

    function useTyping(words) {
      const [wordIndex, setWordIndex] = useState(0);
      const [text, setText] = useState('');
      const [deleting, setDeleting] = useState(false);
      useEffect(() => {
        const current = words[wordIndex];
        const timer = setTimeout(() => {
          if (!deleting && text === current) { setTimeout(() => setDeleting(true), 900); return; }
          if (deleting && text === '') { setDeleting(false); setWordIndex((index) => (index + 1) % words.length); return; }
          setText((value) => deleting ? current.slice(0, value.length - 1) : current.slice(0, value.length + 1));
        }, deleting ? 45 : 85);
        return () => clearTimeout(timer);
      }, [deleting, text, wordIndex]);
      return text;
    }

    function Reveal({ children, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) entry.target.classList.add('visible'); }, { threshold: .16 });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
    }

    function Cursor3D() {
      const core = useRef(null);
      const ring = useRef(null);
      useEffect(() => {
        let x = window.innerWidth / 2, y = window.innerHeight / 2, rx = x, ry = y;
        const move = (event) => { x = event.clientX; y = event.clientY; if (core.current) core.current.style.transform = `translate3d(${x}px, ${y}px, 0)`; };
        const animate = () => { rx += (x - rx) * .16; ry += (y - ry) * .16; if (ring.current) ring.current.style.transform = `translate3d(${rx}px, ${ry}px, 0) rotateX(58deg)`; requestAnimationFrame(animate); };
        window.addEventListener('mousemove', move);
        animate();
        return () => window.removeEventListener('mousemove', move);
      }, []);
      return <><div ref={ring} className="cursor-ring"></div><div ref={core} className="cursor-core"></div></>;
    }

    function Tilt({ children, className = '' }) {
      const ref = useRef(null);
      const onMove = (event) => {
        const element = ref.current;
        if (!element) return;
        const rect = element.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const rotateY = ((x / rect.width) - .5) * 12;
        const rotateX = -((y / rect.height) - .5) * 12;
        element.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
      };
      const onLeave = () => { if (ref.current) ref.current.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) translateY(0px)'; };
      return <div ref={ref} onMouseMove={onMove} onMouseLeave={onLeave} className={`tilt-card ${className}`}>{children}</div>;
    }

    function SkillLogo({ name }) {
      const src = iconMap[name];
      if (!src) return <span className="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-cyan-300/30 to-fuchsia-400/30 text-xs font-black text-cyan-100">{name.slice(0,2).toUpperCase()}</span>;
      return <span className="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white p-1.5 shadow-glow"><img src={src} alt={`${name} logo`} className="h-full w-full object-contain" /></span>;
    }

    function Developer3DBackground() {
      const ref = useRef(null);
      useEffect(() => {
        const element = ref.current;
        if (!element) return;
        const move = (event) => {
          const px = (event.clientX / window.innerWidth) - .5;
          const py = (event.clientY / window.innerHeight) - .5;
          element.style.setProperty('--px', px.toFixed(4));
          element.style.setProperty('--py', py.toFixed(4));
          element.style.setProperty('--mx', `${event.clientX}px`);
          element.style.setProperty('--my', `${event.clientY}px`);
        };
        const scroll = () => element.style.setProperty('--scroll', `${window.scrollY * .04}px`);
        window.addEventListener('mousemove', move);
        window.addEventListener('scroll', scroll, { passive: true });
        scroll();
        return () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('scroll', scroll);
        };
      }, []);

      return (
        <div ref={ref} className="dev-bg" aria-hidden="true">
          <div className="robot-core">
            <span className="robot-eye left"></span>
            <span className="robot-eye right"></span>
            <span className="robot-mouth"></span>
          </div>
          <div className="code-panel" style={{ left: '6%', top: '18%', '--dx': '46px', '--dy': '-32px', '--rot': '-8deg' }}>
            <span style={{ width: '72%' }}></span><span style={{ width: '48%' }}></span><span style={{ width: '84%' }}></span><span style={{ width: '58%' }}></span>
          </div>
          <div className="code-panel" style={{ right: '10%', bottom: '13%', '--dx': '-38px', '--dy': '42px', '--rot': '7deg', animationDelay: '-2s' }}>
            <span style={{ width: '66%' }}></span><span style={{ width: '91%' }}></span><span style={{ width: '44%' }}></span><span style={{ width: '76%' }}></span>
          </div>
          <div className="holo-cube" style={{ left: '13%', bottom: '20%', '--dx': '32px', '--dy': '48px' }}></div>
          <div className="holo-cube" style={{ right: '28%', top: '31%', width: '58px', height: '58px', '--dx': '-52px', '--dy': '-24px', animationDuration: '6s' }}></div>
          <span className="circuit-line" style={{ left: '8%', top: '42%', width: '42vw', '--dx': '30px', '--dy': '-16px', '--rot': '0deg' }}></span>
          <span className="circuit-line" style={{ right: '3%', top: '62%', width: '34vw', '--dx': '-44px', '--dy': '20px', '--rot': '10deg', animationDelay: '-1.5s' }}></span>
          <span className="circuit-line" style={{ left: '34%', top: '78%', width: '31vw', '--dx': '22px', '--dy': '38px', '--rot': '-14deg', animationDelay: '-3s' }}></span>
        </div>
      );

    function App() {
      const typedText = useTyping(typingRoles);
      const [menuOpen, setMenuOpen] = useState(false);

ite outline-none transition placeholder:text-slate-500 focus:border-cyan-300/70" placeholder="you@example.com" /></label></div><label className="mt-5 block"><span className="text-sm font-semibold text-slate-200">Message</span><textarea name="message" required rows="6" className="mt-2 w-full resize-none rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-300/70" placeholder="Tell me about the role, project, or idea."></textarea></label><button type="submit" className="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-full bg-gradient-to-r from-cyan-300 via-emerald-300 to-fuchsia-400 px-6 py-3 font-black text-ink shadow-glow transition hover:scale-[1.02]"><MailIcon /> Send Message</button>{sent && <p className="mt-4 text-center text-sm text-emerald-200">Your email app is opening with the message ready.</p>}</form></Tilt></Reveal></section>
